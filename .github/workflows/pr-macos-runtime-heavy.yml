name: pr-macos-runtime-heavy

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
    paths:
      - CMakeLists.txt
      - cmake/**
      - runtime/**
      - tests/**
      - clients/common/src/Protocol.h
      - clients/common/OpenXRStreaming/Sources/OpenXRStreaming/Protocol.swift
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  runtime-heavy:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v3
        with:
          install: true
          cache: true

      - name: Heavy macOS runtime verification
        run: scripts/ci/verify-macos-runtime-heavy.sh
